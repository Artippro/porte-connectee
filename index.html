<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telecommande Porte</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 40px 30px;
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 5em; margin-bottom: 15px; transition: all 0.3s; }
    h1 { font-size: 1.6em; margin-bottom: 5px; }
    .subtitle { opacity: 0.5; font-size: 0.85em; margin-bottom: 25px; }
    .status {
      font-size: 1.1em;
      margin: 20px 0;
      padding: 12px 20px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .status.on { background: rgba(0,255,100,0.15); color: #00ff64; }
    .status.off { background: rgba(255,50,50,0.15); color: #ff5050; }
    .status.waiting { background: rgba(255,200,0,0.15); color: #ffc800; }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      font-size: 1.2em;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      margin: 10px 0;
    }
    .btn:active { transform: scale(0.97); }
    .btn-on { background: linear-gradient(135deg, #00b09b, #96c93d); }
    .btn-on:hover { box-shadow: 0 5px 25px rgba(0,176,155,0.4); }
    .btn-off { background: linear-gradient(135deg, #e53935, #e35d5b); }
    .btn-off:hover { box-shadow: 0 5px 25px rgba(229,57,53,0.4); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .connexion {
      margin-top: 25px;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.8em;
    }
    .connexion.ok { background: rgba(0,255,100,0.1); color: #00ff64; }
    .connexion.ko { background: rgba(255,50,50,0.1); color: #ff5050; }
    .connexion.loading { background: rgba(255,200,0,0.1); color: #ffc800; }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.green { background: #00ff64; }
    .dot.red { background: #ff5050; }
    .dot.yellow { background: #ffc800; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* --- Ecran de code --- */
    .lock-screen {
      text-align: center;
      padding: 40px 30px;
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      max-width: 400px;
      width: 90%;
    }
    .lock-screen .icon { font-size: 4em; margin-bottom: 10px; }
    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 25px 0;
    }
    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
    }
    .pin-dot.filled {
      background: #00ff64;
      border-color: #00ff64;
      box-shadow: 0 0 10px rgba(0,255,100,0.4);
    }
    .pin-dot.error {
      background: #ff5050;
      border-color: #ff5050;
      box-shadow: 0 0 10px rgba(255,50,50,0.4);
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 260px;
      margin: 0 auto;
    }
    .key {
      padding: 16px;
      font-size: 1.4em;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .key:hover { background: rgba(255,255,255,0.2); }
    .key:active { transform: scale(0.93); background: rgba(255,255,255,0.25); }
    .key-del { background: rgba(255,50,50,0.2); font-size: 1em; }
    .key-del:hover { background: rgba(255,50,50,0.3); }
    .error-msg {
      color: #ff5050;
      margin-top: 15px;
      font-size: 0.9em;
      min-height: 1.2em;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ECRAN CODE PIN -->
  <div class="lock-screen" id="lockScreen">
    <div class="icon">&#128274;</div>
    <h1>Porte Connectee</h1>
    <div class="subtitle">Entrez le code d'acces</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="addDigit('1')">1</button>
      <button class="key" onclick="addDigit('2')">2</button>
      <button class="key" onclick="addDigit('3')">3</button>
      <button class="key" onclick="addDigit('4')">4</button>
      <button class="key" onclick="addDigit('5')">5</button>
      <button class="key" onclick="addDigit('6')">6</button>
      <button class="key" onclick="addDigit('7')">7</button>
      <button class="key" onclick="addDigit('8')">8</button>
      <button class="key" onclick="addDigit('9')">9</button>
      <button class="key key-del" onclick="clearPin()">&#9003;</button>
      <button class="key" onclick="addDigit('0')">0</button>
      <button class="key key-del" onclick="removeDigit()">&#8592;</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- ECRAN CONTROLE (caché au départ) -->
  <div class="container hidden" id="controlScreen">
    <div class="icon" id="icon">&#128274;</div>
    <h1>Porte Connectee</h1>
    <div class="subtitle">Controle a distance mondial</div>

    <div class="status waiting" id="status">Connexion en cours...</div>

    <button class="btn btn-on" id="btnOn" onclick="send('ON')" disabled>OUVRIR</button>
    <button class="btn btn-off" id="btnOff" onclick="send('OFF')" disabled>FERMER</button>

    <div class="connexion loading" id="connexion">
      <span class="dot yellow" id="dot"></span>
      Connexion au serveur...
    </div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // ===== CODE PIN (4 chiffres) =====
    const CODE_PIN = '1234';
    // ==================================

    let pinInput = '';
    let attempts = 0;
    const maxAttempts = 5;

    function addDigit(d) {
      if (pinInput.length >= 4) return;
      pinInput += d;
      updateDots();
      if (pinInput.length === 4) {
        setTimeout(checkPin, 200);
      }
    }

    function removeDigit() {
      pinInput = pinInput.slice(0, -1);
      updateDots();
      document.getElementById('errorMsg').textContent = '';
    }

    function clearPin() {
      pinInput = '';
      updateDots();
      document.getElementById('errorMsg').textContent = '';
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        dot.className = 'pin-dot' + (i < pinInput.length ? ' filled' : '');
      }
    }

    function checkPin() {
      if (pinInput === CODE_PIN) {
        // Bon code
        document.getElementById('lockScreen').classList.add('hidden');
        document.getElementById('controlScreen').classList.remove('hidden');
        connectMQTT();
      } else {
        // Mauvais code
        attempts++;
        for (let i = 0; i < 4; i++) {
          document.getElementById('d' + i).className = 'pin-dot error';
        }
        if (attempts >= maxAttempts) {
          document.getElementById('errorMsg').textContent = 'Trop de tentatives. Rechargez la page.';
          document.querySelectorAll('.key').forEach(k => k.disabled = true);
        } else {
          document.getElementById('errorMsg').textContent = 'Code incorrect (' + (maxAttempts - attempts) + ' essais restants)';
          setTimeout(() => { pinInput = ''; updateDots(); }, 600);
        }
      }
    }

    // ===== MQTT (lancé seulement après le bon code) =====
    const topicCmd   = 'porte-vincent-2026/commande';
    const topicState = 'porte-vincent-2026/etat';

    let client = null;
    let currentState = 'OFF';

    function connectMQTT() {
      const iconEl   = document.getElementById('icon');
      const statusEl = document.getElementById('status');
      const connexEl = document.getElementById('connexion');
      const btnOn    = document.getElementById('btnOn');
      const btnOff   = document.getElementById('btnOff');

      client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
        clientId: 'web-porte-' + Math.random().toString(36).substr(2, 8),
        clean: true
      });

      client.on('connect', function () {
        connexEl.className = 'connexion ok';
        connexEl.innerHTML = '<span class="dot green"></span> Connecte au cloud';
        btnOn.disabled = false;
        btnOff.disabled = false;
        client.subscribe(topicState);
      });

      client.on('message', function (topic, message) {
        if (topic === topicState) {
          currentState = message.toString();
          updateControlUI();
        }
      });

      client.on('error', function () {
        connexEl.className = 'connexion ko';
        connexEl.innerHTML = '<span class="dot red"></span> Erreur de connexion';
      });

      client.on('offline', function () {
        connexEl.className = 'connexion ko';
        connexEl.innerHTML = '<span class="dot red"></span> Deconnecte';
        btnOn.disabled = true;
        btnOff.disabled = true;
      });

      function updateControlUI() {
        if (currentState === 'ON') {
          iconEl.innerHTML = '&#128275;';
          statusEl.className = 'status on';
          statusEl.textContent = 'Etat : OUVERT (LED allumee)';
        } else {
          iconEl.innerHTML = '&#128274;';
          statusEl.className = 'status off';
          statusEl.textContent = 'Etat : FERME (LED eteinte)';
        }
      }
      updateControlUI();
    }

    function send(command) {
      if (client) client.publish(topicCmd, command);
    }
  </script>
</body>
</html>
